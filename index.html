    </header>

    <button class="back-to-top" id="back-to-top" aria-label="返回顶部" title="返回顶部">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-svg back-to-top-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
        </svg>
    </button>

    <main class="main-content">
        <section class="blog-list" id="blog-list" aria-label="内容区域"></section>
    </main>

    <!-- 设置面板 -->
    <div class="settings-modal" id="settings-modal">
        <div class="settings-overlay" id="settings-overlay"></div>
        <div class="settings-panel">
            <div class="settings-header">
                <h3>⚙️ 设置</h3>
                <button class="settings-close" id="settings-close" aria-label="关闭设置">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label for="bg-blur">背景模糊度</label>
                    <div class="slider-container">
                        <input type="range" id="bg-blur" min="0" max="20" step="1" value="20">
                        <span class="slider-value" id="blur-value">20px</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label for="bg-brightness">背景明暗度</label>
                    <div class="slider-container">
                        <input type="range" id="bg-brightness" min="20" max="200" step="5" value="100">
                        <span class="slider-value" id="brightness-value">100%</span>
                    </div>
                </div>
            </div>
            <div class="settings-footer">
                <button class="reset-btn" id="reset-settings">重置默认</button>
            </div>
        </div>
    </div>
